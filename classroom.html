<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Classroom Management</title>
    <link rel="stylesheet" href="classroom.css">
</head>
<body>

<div class="container">
    <h1>Show classrooms</h1>

    <!-- Input -->
    <div class="input-section">
        <input type="text" id="classroomInput" placeholder="Enter Classroom Name">
        <button onclick="addClassroom()">Add Classroom</button>
    </div>

    <!-- Search -->
    <input type="text" id="searchBox" placeholder="Search Classroom..." onkeyup="searchClassroom()">

    <!-- List -->
    <ul id="classroomList"></ul>

    <button class="back-btn" onclick="goBack()">Back</button>
</div>

<script src="classroom.js"></script>
</body>
</html>
